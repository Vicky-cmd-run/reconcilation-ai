version: '3.8'

services:
  # Backend API service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: reconciliation-api
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=FMCG Reconciliation AI
      - DEBUG=false
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LLM_CACHE_ENABLED=true
      - LLM_CACHE_SIZE=1000
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_REQUESTS=100
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - reconciliation-network

  # Frontend service (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reconciliation-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - reconciliation-network

  # Streamlit app (alternative frontend)
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reconciliation-streamlit
    ports:
      - "8501:8501"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reconciliation-network
    profiles:
      - streamlit  # Only start with: docker-compose --profile streamlit up

networks:
  reconciliation-network:
    driver: bridge

volumes:
  logs:
    driver: local
